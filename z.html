<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ RIA Secured Network ]</title>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 600px; }
        h1 {
            color: #ff0033;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #ff0033;
            padding-bottom: 10px;
        }
        form {
            background: #0a0a0a;
            border: 1px solid #ff0033;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 60px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            font-family: inherit;
        }
        textarea:focus { border-color: #ff0033; outline: none; }
        .form-actions { display: flex; justify-content: flex-end; margin-top: 10px; }
        button {
            background: #ff0033;
            color: #fff;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
        }
        button:hover { background: #cc002c; }
        .post-card {
            background: #050505;
            border-left: 4px solid #ff0033;
            border-bottom: 1px solid #111;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 5px 5px 0;
        }
        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
            color: #888;
        }
        .post-meta { display: flex; align-items: center; }
        .avatar { width: 22px; height: 22px; border-radius: 50%; margin-right: 10px; display: inline-block; }
        .post-actions { display: flex; gap: 10px; }
        .action-btn {
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            display: none;
        }
        .action-btn.my-post { display: inline-block; color: #888; }
        .action-btn.edit:hover { color: #3399ff; }
        .action-btn.delete:hover { color: #ff0033; }
        .post-content { white-space: pre-wrap; word-break: break-word; margin-bottom: 15px; }
        
        /* Section Commentaires */
        .comments-section {
            border-top: 1px solid #222;
            padding-top: 10px;
            margin-top: 10px;
        }
        .comments-list { margin-bottom: 10px; }
        .comment-item {
            font-size: 13px;
            background: #0c0c0c;
            padding: 6px 10px;
            margin-bottom: 5px;
            border-radius: 3px;
            border-left: 2px solid #555;
        }
        .comment-header { font-size: 11px; color: #666; margin-bottom: 3px; }
        .comment-form { display: flex; gap: 5px; background: none; border: none; padding: 0; margin: 0; }
        .comment-input {
            flex: 1;
            background: #000;
            border: 1px solid #222;
            color: #fff;
            padding: 5px;
            font-family: inherit;
            font-size: 12px;
        }
        .comment-input:focus { border-color: #ff0033; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>[ RIA - Secured Sync Network ]</h1>

    <form id="post-form">
        <textarea id="post-text" placeholder="Écrit ton message ou code LaTeX... Sync active."></textarea>
        <div class="form-actions">
            <button type="submit">Broadcast</button>
        </div>
    </form>

    <div id="posts-container"></div>
</div>

<script>
    let myToken = localStorage.getItem('ria_user_secure_token');
    if (!myToken) {
        myToken = 'usr_' + Math.random().toString(36).substring(2, 15);
        localStorage.setItem('ria_user_secure_token', myToken);
    }
    const myAvatarSeed = myToken.substring(0, 4);

    // CONFIGURATION FORCEE DU POLLING POUR RENDER (Anti-blocage réseau)
    const socket = io({
        transports: ['polling', 'websocket'],
        upgrade: true
    });

    const container = document.getElementById('posts-container');
    const form = document.getElementById('post-form');
    const input = document.getElementById('post-text');

    function createPostHTML(post) {
        const card = document.createElement('div');
        card.className = 'post-card';
        card.id = `card-${post.id}`;
        
        const isMyPost = (post.avatar_seed === myAvatarSeed);
        const actionClass = isMyPost ? 'action-btn my-post' : 'action-btn';

        // Générer le HTML des commentaires existants
        let commentsHTML = '';
        if (post.comments) {
            post.comments.forEach(c => {
                commentsHTML += `
                    <div class="comment-item">
                        <div class="comment-header">NODE_${c.avatar_seed}</div>
                        <div>${c.text}</div>
                    </div>`;
            });
        }

        card.innerHTML = `
            <div class="post-header">
                <div class="post-meta">
                    <div class="avatar" style="background-color: #${intToRGB(hashCode(post.avatar_seed))}"></div>
                    <span>NODE_${post.id} ${isMyPost ? '(Moi)' : ''}</span>
                </div>
                <div class="post-actions">
                    <button class="${actionClass} edit" onclick="requestEdit('${post.id}')">Éditer</button>
                    <button class="${actionClass} delete" onclick="requestDelete('${post.id}')">Supprimer</button>
                </div>
            </div>
            <div class="post-content" id="content-${post.id}">${post.description}</div>
            
            <div class="comments-section">
                <div class="comments-list" id="comments-list-${post.id}">${commentsHTML}</div>
                <div class="comment-form">
                    <input type="text" class="comment-input" id="comment-input-${post.id}" placeholder="Ajouter un commentaire LaTeX...">
                    <button type="button" onclick="submitComment('${post.id}')">OK</button>
                </div>
            </div>
        `;
        return card;
    }

    function hashCode(str) { let hash = 0; for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); } return hash; }
    function intToRGB(i){ let c = (i & 0x00FFFFFF).toString(16).toUpperCase(); return "00000".substring(0, 6 - c.length) + c; }

    async function loadHistory() {
        try {
            const res = await fetch('/api/posts');
            const posts = await res.json();
            container.innerHTML = '';
            posts.forEach(post => container.appendChild(createPostHTML(post)));
            triggerLaTeX();
        } catch (err) { console.error("Erreur historique"); }
    }

    function triggerLaTeX() {
        if (window.MathJax && window.MathJax.typesetPromise) MathJax.typesetPromise();
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (input.value.trim() === "") return;
        socket.emit('new_post', { description: input.value, user_token: myToken });
        input.value = '';
    });

    function requestDelete(id) {
        if (confirm("Supprimer ton message ?")) {
            socket.emit('delete_post', { id: id, user_token: myToken });
        }
    }

    function requestEdit(id) {
        const currentText = document.getElementById(`content-${id}`).innerText;
        const newText = prompt("Modifier ton message :", currentText);
        if (newText !== null && newText.trim() !== "") {
            socket.emit('edit_post', { id: id, description: newText, user_token: myToken });
        }
    }

    function submitComment(postId) {
        const commentInput = document.getElementById(`comment-input-${postId}`);
        if (commentInput.value.trim() === "") return;
        socket.emit('new_comment', { post_id: postId, text: commentInput.value, user_token: myToken });
        commentInput.value = '';
    }

    // --- RECEPTION EN DIRECT POUR TOUS LES NAVIGATEURS DE LA PLANÈTE ---
    socket.on('broadcast_post', (newPost) => {
        const card = createPostHTML(newPost);
        container.insertBefore(card, container.firstChild);
        triggerLaTeX();
    });

    socket.on('broadcast_delete', (data) => {
        const card = document.getElementById(`card-${data.id}`);
        if (card) card.remove();
    });

    socket.on('broadcast_edit', (data) => {
        const contentDiv = document.getElementById(`content-${data.id}`);
        if (contentDiv) {
            contentDiv.innerText = data.description;
            triggerLaTeX();
        }
    });

    socket.on('broadcast_comment', (data) => {
        const listDiv = document.getElementById(`comments-list-${data.post_id}`);
        if (listDiv) {
            const commentHTML = `
                <div class="comment-item">
                    <div class="comment-header">NODE_${data.comment.avatar_seed}</div>
                    <div>${data.comment.text}</div>
                </div>`;
            listDiv.insertAdjacentHTML('beforeend', commentHTML);
            triggerLaTeX(); // Rendu LaTeX instantané sur le commentaire de tout le monde !
        }
    });

    loadHistory();
</script>

</body>
</html>
