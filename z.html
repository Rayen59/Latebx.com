<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ RIA Network ]</title>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 600px; }
        h1 {
            color: #ff0033;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #ff0033;
            padding-bottom: 10px;
        }
        form {
            background: #0a0a0a;
            border: 1px solid #ff0033;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 80px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            font-family: inherit;
        }
        textarea:focus { border-color: #ff0033; outline: none; }
        .form-actions { display: flex; justify-content: flex-end; margin-top: 10px; }
        button {
            background: #ff0033;
            color: #fff;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
        button:hover { background: #cc002c; }
        .post-card {
            background: #050505;
            border-left: 4px solid #ff0033;
            border-bottom: 1px solid #111;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 5px 5px 0;
        }
        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
            color: #888;
        }
        .post-meta { display: flex; align-items: center; }
        .avatar { width: 25px; height: 25px; border-radius: 50%; margin-right: 10px; }
        .post-actions { display: flex; gap: 10px; }
        .action-btn {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
        }
        .action-btn.edit:hover { color: #3399ff; }
        .action-btn.delete:hover { color: #ff0033; }
        .post-content { white-space: pre-wrap; word-break: break-word; }
    </style>
</head>
<body>

<div class="container">
    <h1>[ RIA - Global Sync Network ]</h1>

    <form id="post-form">
        <textarea id="post-text" placeholder="Écrit ton message ou formule LaTeX... Envoi instantané mondial."></textarea>
        <div class="form-actions">
            <button type="submit">Broadcast</button>
        </div>
    </form>

    <div id="posts-container"></div>
</div>

<script>
    // Connexion immédiate au serveur WebSocket de Render
    const socket = io();
    const container = document.getElementById('posts-container');
    const form = document.getElementById('post-form');
    const input = document.getElementById('post-text');

    // Structure d'affichage d'un post unique
    function createPostHTML(post) {
        const card = document.createElement('div');
        card.className = 'post-card';
        card.id = `card-${post.id}`;
        card.innerHTML = `
            <div class="post-header">
                <div class="post-meta">
                    <div class="avatar" style="background-color: #${intToRGB(hashCode(post.avatar_seed))}"></div>
                    <span>NODE_${post.id}</span>
                </div>
                <div class="post-actions">
                    <button class="action-btn edit" onclick="requestEdit('${post.id}')">Éditer</button>
                    <button class="action-btn delete" onclick="requestDelete('${post.id}')">Supprimer</button>
                </div>
            </div>
            <div class="post-content" id="content-${post.id}">${post.description}</div>
        `;
        return card;
    }

    function hashCode(str) { let hash = 0; for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); } return hash; }
    function intToRGB(i){ let c = (i & 0x00FFFFFF).toString(16).toUpperCase(); return "00000".substring(0, 6 - c.length) + c; }

    // 1. Charger l'historique au démarrage
    async function loadHistory() {
        try {
            const res = await fetch('/api/posts');
            const posts = await res.json();
            container.innerHTML = '';
            posts.forEach(post => container.appendChild(createPostHTML(post)));
            triggerLaTeX();
        } catch (err) { console.error("Erreur historique"); }
    }

    function triggerLaTeX() {
        if (window.MathJax && window.MathJax.typesetPromise) MathJax.typesetPromise();
    }

    // 2. ENVOYER une action via WebSocket
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (!input.value.strip && input.value.trim() === "") return;
        socket.emit('new_post', { description: input.value });
        input.value = '';
    });

    function requestDelete(id) {
        if (confirm("Supprimer ce message pour TOUT LE MONDE ?")) {
            socket.emit('delete_post', { id: id });
        }
    }

    function requestEdit(id) {
        const currentText = document.getElementById(`content-${id}`).innerText;
        const newText = prompt("Modifier le message global :", currentText);
        if (newText !== null && newText.trim() !== "") {
            socket.emit('edit_post', { id: id, description: newText });
        }
    }

    // 3. RÉCEPTIONNER les mises à jour du serveur en temps réel (pour TOUS les utilisateurs)
    socket.on('broadcast_post', (newPost) => {
        const card = createPostHTML(newPost);
        container.insertBefore(card, container.firstChild); // Ajoute tout en haut de l'écran chez tout le monde
        triggerLaTeX();
    });

    socket.on('broadcast_delete', (data) => {
        const card = document.getElementById(`card-${data.id}`);
        if (card) card.remove(); // S'efface instantanément de l'écran de tout le monde
    });

    socket.on('broadcast_edit', (data) => {
        const contentDiv = document.getElementById(`content-${data.id}`);
        if (contentDiv) {
            contentDiv.innerText = data.description; // Se modifie chez tout le monde
            triggerLaTeX();
        }
    });

    loadHistory();
</script>

</body>
</html>
