<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANONYMOUS TRANSMISSION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { background-color: #000000; }
        .amoled-card { background-color: #050505; border: 1px solid #1a0505; }
        .amoled-card:hover { border-color: #991b1b; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #991b1b; }
    </style>
</head>
<body class="text-gray-200 font-mono antialiased selection:bg-red-700 selection:text-white">

    <header class="border-b border-red-950 bg-black sticky top-0 z-50 p-4">
        <div class="max-w-md mx-auto flex flex-col gap-2">
            <div class="flex justify-between items-center">
                <h1 class="text-lg font-black tracking-widest text-red-600 animate-pulse">⚡ ANONYMOUS</h1>
                <span class="text-[10px] bg-red-950/50 text-red-500 border border-red-900/50 px-2 py-0.5 rounded uppercase tracking-wider">Node Active</span>
            </div>
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Filter transmissions..." 
                       class="w-full bg-zinc-950 border border-zinc-900 rounded px-4 py-2 text-xs text-white placeholder-zinc-600 focus:outline-none focus:border-red-600 transition">
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24 space-y-6">
        
        <section class="amoled-card rounded p-4 shadow-xl transition-all duration-300">
            <form id="uploadForm" enctype="multipart/form-data" class="space-y-3">
                <div class="flex justify-between items-center border-b border-zinc-900 pb-2">
                    <span class="text-[11px] uppercase tracking-widest text-zinc-500">New Payload</span>
                </div>

                <label class="block w-full text-center bg-zinc-950 border border-dashed border-zinc-850 hover:border-red-800 p-4 rounded cursor-pointer transition">
                    <span class="text-xs text-zinc-400" id="uploadLabel">Attach Media (Video/Audio/Photo)</span>
                    <input type="file" name="media" id="mediaInput" accept="video/*,audio/*,image/*" class="hidden">
                </label>
                
                <textarea name="description" id="descInput" rows="2" placeholder="Encryption input payload string (Optional)... Support LaTeX math" 
                       class="w-full bg-zinc-950 border border-zinc-900 rounded p-2 text-xs text-white focus:outline-none focus:border-red-600 resize-none"></textarea>
                
                <p id="validationError" class="text-red-500 text-[11px] hidden"></p>

                <button type="submit" class="w-full bg-red-700 hover:bg-red-600 text-white font-bold tracking-widest py-2 rounded text-xs transition uppercase">
                    Execute Broadcast
                </button>
            </form>
        </section>

        <div id="feed" class="space-y-4"></div>
    </main>

    <script>
        const feed = document.getElementById('feed');
        const uploadForm = document.getElementById('uploadForm');
        const mediaInput = document.getElementById('mediaInput');
        const searchInput = document.getElementById('searchInput');
        const uploadLabel = document.getElementById('uploadLabel');
        const errorMsg = document.getElementById('validationError');

        mediaInput.addEventListener('change', function() {
            if(this.files[0]) {
                const file = this.files[0];
                uploadLabel.innerText = `Bound: ${file.name.substring(0, 25)}...`;
                
                if(file.type.startsWith('video/')) {
                    const video = document.createElement('video');
                    video.preload = 'metadata';
                    video.src = URL.createObjectURL(file);
                    video.onloadedmetadata = function() {
                        window.URL.revokeObjectURL(video.src);
                        if (video.duration > 60) {
                            errorMsg.innerText = "🚨 REJECTED: Video payload exceeds 60 seconds!";
                            errorMsg.classList.remove('hidden');
                            mediaInput.value = '';
                            uploadLabel.innerText = "Attach Media (Video/Audio/Photo)";
                        } else {
                            errorMsg.classList.add('hidden');
                        }
                    }
                } else {
                    errorMsg.classList.add('hidden');
                }
            }
        });

        async function fetchFeed(search = '') {
            const res = await fetch(`/api/posts?search=${search}`);
            const posts = await res.json();
            feed.innerHTML = '';
            
            posts.forEach(post => {
                let mediaHtml = '';
                if(post.type === 'video') {
                    mediaHtml = `<video src="/uploads/${post.filename}" class="w-full max-h-96 rounded bg-black" controls loop muted></video>`;
                } else if(post.type === 'image') {
                    mediaHtml = `<img src="/uploads/${post.filename}" class="w-full max-h-96 object-cover rounded" alt="payload">`;
                } else if(post.type === 'audio') {
                    mediaHtml = `<audio src="/uploads/${post.filename}" class="w-full mt-2" controls></audio>`;
                }

                const card = document.createElement('div');
                card.className = 'amoled-card rounded p-4 flex flex-col gap-3 shadow-md transition-all duration-200';
                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <img src="https://robohash.org/${post.avatar_seed}?set=set4&bgset=bg1" class="w-8 h-8 rounded-full border border-red-950 bg-zinc-900" alt="Anonymous">
                            <div>
                                <h3 class="text-xs font-bold text-red-500 tracking-wider">ANONYMOUS</h3>
                                <p class="text-[9px] text-zinc-600">ID: ${post.id}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 text-[11px]">
                            <button onclick="editPost('${post.id}', '${escape(post.description)}')" class="text-zinc-500 hover:text-amber-500 transition">[EDIT]</button>
                            <button onclick="deletePost('${post.id}')" class="text-zinc-600 hover:text-red-600 transition">[PURGE]</button>
                        </div>
                    </div>
                    ${mediaHtml}
                    ${post.description ? `<p class="text-xs text-zinc-300 tracking-wide leading-relaxed" id="desc-${post.id}">${post.description}</p>` : ''}
                `;
                feed.appendChild(card);
            });

            // Re-déclencher le rendu MathJax pour afficher le LaTeX converti
            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise();
            }
        }

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(uploadForm);
            const res = await fetch('/api/posts', { method: 'POST', body: formData });
            if(res.ok) {
                uploadForm.reset();
                uploadLabel.innerText = "Attach Media (Video/Audio/Photo)";
                errorMsg.classList.add('hidden');
                fetchFeed(searchInput.value);
            } else {
                const err = await res.json();
                errorMsg.innerText = `🚨 ${err.error}`;
                errorMsg.classList.remove('hidden');
            }
        });

        async function deletePost(id) {
            if(confirm("Confirm critical structural deletion?")) {
                await fetch(`/api/posts/${id}`, { method: 'DELETE' });
                fetchFeed(searchInput.value);
            }
        }

        async function editPost(id, oldDesc) {
            const newDesc = prompt("Edit payload description string:", unescape(oldDesc));
            if (newDesc !== null) {
                await fetch(`/api/posts/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description: newDesc })
                });
                fetchFeed(searchInput.value);
            }
        }

        searchInput.addEventListener('input', (e) => fetchFeed(e.target.value));
        fetchFeed();
    </script>
</body>
</html>
