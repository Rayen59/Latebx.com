<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latebx Network</title>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        h1 {
            color: #ff0033;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #ff0033;
            padding-bottom: 10px;
        }
        form {
            background: #0a0a0a;
            border: 1px solid #ff0033;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 80px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            font-family: inherit;
        }
        textarea:focus {
            border-color: #ff0033;
            outline: none;
        }
        .form-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }
        input[type="file"] {
            color: #888;
            font-size: 12px;
        }
        button {
            background: #ff0033;
            color: #fff;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
        button:hover {
            background: #cc002c;
        }
        .post-card {
            background: #050505;
            border-left: 4px solid #ff0033;
            border-bottom: 1px solid #111;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 5px 5px 0;
        }
        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
            color: #888;
        }
        .post-meta {
            display: flex;
            align-items: center;
        }
        .avatar {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .post-actions {
            display: flex;
            gap: 10px;
        }
        .action-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            padding: 2px 5px;
        }
        .action-btn.edit:hover { color: #3399ff; }
        .action-btn.delete:hover { color: #ff0033; }
        .media-container img, .media-container video {
            max-width: 100%;
            border-radius: 5px;
            margin-top: 10px;
            border: 1px solid #222;
        }
        audio { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>[ RIA - Security Network ]</h1>

    <form id="post-form" enctype="multipart/form-data">
        <textarea name="description" placeholder="Écrit ton message ou code LaTeX ici..."></textarea>
        <div class="form-actions">
            <input type="file" name="media" accept="image/*,video/*,audio/*">
            <button type="submit">Broadcast</button>
        </div>
    </form>

    <div id="posts-container"></div>
</div>

<script>
    const container = document.getElementById('posts-container');
    const form = document.getElementById('post-form');

    // Générer l'affichage complet des posts
    function renderPosts(posts) {
        container.innerHTML = '';
        posts.forEach(post => {
            const card = document.createElement('div');
            card.className = 'post-card';
            card.id = `card-${post.id}`;
            
            let mediaHTML = '';
            if (post.filename) {
                const fileUrl = `/uploads/${post.filename}`;
                if (post.type === 'image') mediaHTML = `<div class="media-container"><img src="${fileUrl}"></div>`;
                else if (post.type === 'video') mediaHTML = `<div class="media-container"><video src="${fileUrl}" controls></video></div>`;
                else if (post.type === 'audio') mediaHTML = `<audio src="${fileUrl}" controls></audio>`;
            }

            card.innerHTML = `
                <div class="post-header">
                    <div class="post-meta">
                        <div class="avatar" style="background-color: #${intToRGB(hashCode(post.avatar_seed))}"></div>
                        <span>NODE_${post.id}</span>
                    </div>
                    <div class="post-actions">
                        <button class="action-btn edit" onclick="editPost('${post.id}')">Éditer</button>
                        <button class="action-btn delete" onclick="deletePost('${post.id}')">Supprimer</button>
                    </div>
                </div>
                <div class="post-content" id="content-${post.id}">${post.description}</div>
                ${mediaHTML}
            `;
            container.appendChild(card);
        });

        if (window.MathJax && window.MathJax.typesetPromise) {
            MathJax.typesetPromise();
        }
    }

    function hashCode(str) { let hash = 0; for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); } return hash; }
    function intToRGB(i){ let c = (i & 0x00FFFFFF).toString(16).toUpperCase(); return "00000".substring(0, 6 - c.length) + c; }

    // Charger depuis le serveur
    async function fetchServerPosts() {
        try {
            const res = await fetch('/api/posts');
            if (res.ok) {
                const posts = await res.json();
                localStorage.setItem('local_posts_cache', JSON.stringify(posts));
                renderPosts(posts);
            }
        } catch (err) { console.log("Utilisation du cache."); }
    }

    // ACTION 1 : AJOUT INSTANTANÉ
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(form);

        try {
            const res = await fetch('/api/posts', { method: 'POST', body: formData });
            if (res.ok) {
                const newPost = await res.json();
                
                let currentPosts = JSON.parse(localStorage.getItem('local_posts_cache') || '[]');
                currentPosts.unshift(newPost);
                localStorage.setItem('local_posts_cache', JSON.stringify(currentPosts));
                
                renderPosts(currentPosts); // Rendu immédiat
                form.reset();
            }
        } catch (err) { alert("Erreur réseau."); }
    });

    // ACTION 2 : SUPPRESSION INSTANTANÉE
    async function deletePost(postId) {
        if (!confirm("Supprimer définitivement ce payload ?")) return;

        try {
            const res = await fetch(`/api/posts/${postId}`, { method: 'DELETE' });
            if (res.ok) {
                // Retirer immédiatement du DOM sans recharger
                const card = document.getElementById(`card-${postId}`);
                if (card) card.remove();

                // Mettre à jour le cache local
                let currentPosts = JSON.parse(localStorage.getItem('local_posts_cache') || '[]');
                currentPosts = currentPosts.filter(p => p.id !== postId);
                localStorage.setItem('local_posts_cache', JSON.stringify(currentPosts));
            }
        } catch (err) { alert("Erreur de suppression."); }
    }

    // ACTION 3 : MODIFICATION INSTANTANÉE
    async function editPost(postId) {
        const contentDiv = document.getElementById(`content-${postId}`);
        const currentText = contentDiv.innerText;
        
        const newText = prompt("Modifier le contenu :", currentText);
        if (newText === null || newText.trim() === "") return;

        try {
            const res = await fetch(`/api/posts/${postId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: newText })
            });

            if (res.ok) {
                // Modifier directement l'affichage du texte à l'écran
                contentDiv.innerText = newText;

                // Relancer MathJax si le texte contient du LaTeX modifié
                if (window.MathJax && window.MathJax.typesetPromise) {
                    MathJax.typesetPromise();
                }

                // Mettre à jour le cache local
                let currentPosts = JSON.parse(localStorage.getItem('local_posts_cache') || '[]');
                const postIndex = currentPosts.findIndex(p => p.id === postId);
                if (postIndex !== -1) {
                    currentPosts[postIndex].description = newText;
                    localStorage.setItem('local_posts_cache', JSON.stringify(currentPosts));
                }
            }
        } catch (err) { alert("Erreur de mise à jour."); }
    }

    // Démarrage initial rapide
    const initialCache = localStorage.getItem('local_posts_cache');
    if (initialCache) { renderPosts(JSON.parse(initialCache)); }
    fetchServerPosts();
</script>

</body>
</html>
